# Alembic configuration.
# sqlalchemy.url is intentionally left blank here — alembic/env.py overrides
# it at runtime from app.core.config.Settings (DATABASE_URL env var), so the
# connection string is never duplicated or committed in this file.

[alembic]
script_location = alembic
sqlalchemy.url =

# Ensures `backend/` (the directory containing this file) is on sys.path
# before env.py runs `from app... import ...`. Without this, the plain
# `alembic` console-script entry point does NOT add the current working
# directory to sys.path (unlike `python -m alembic`, which does) — so
# `alembic upgrade head` run from backend/ fails with
# `ModuleNotFoundError: No module named 'app'` even though the same command
# via `python -m alembic` works. Interpreted relative to this ini file's
# own directory, not the caller's cwd, so it's correct regardless of where
# `alembic` is invoked from.
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handlers]
keys = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatters]
keys = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
